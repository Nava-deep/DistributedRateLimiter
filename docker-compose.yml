services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: distributed_rate_limiter
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/distributed_rate_limiter
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: ["alembic", "upgrade", "head"]

  api1:
    build: .
    env_file:
      - .env
    environment:
      APP_INSTANCE_NAME: api-1
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/distributed_rate_limiter
      REDIS_URL: redis://redis:6379/0
      STRICT_STARTUP_CHECKS: "true"
    depends_on:
      - postgres
      - redis
    ports:
      - "8001:8000"

  api2:
    build: .
    env_file:
      - .env
    environment:
      APP_INSTANCE_NAME: api-2
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/distributed_rate_limiter
      REDIS_URL: redis://redis:6379/0
      STRICT_STARTUP_CHECKS: "true"
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      - api1
      - api2
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres_data:

