services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: distributed_rate_limiter
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d distributed_rate_limiter"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/distributed_rate_limiter
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api1:
    build: .
    env_file:
      - .env
    environment:
      APP_INSTANCE_NAME: api-1
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/distributed_rate_limiter
      REDIS_URL: redis://redis:6379/0
      STRICT_STARTUP_CHECKS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api2:
    build: .
    env_file:
      - .env
    environment:
      APP_INSTANCE_NAME: api-2
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/distributed_rate_limiter
      REDIS_URL: redis://redis:6379/0
      STRICT_STARTUP_CHECKS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8002:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
